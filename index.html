<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCe Solutions — Virtual Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0052cc; --blue-dk: #003d99; --blue-lt: #e8f0ff;
      --gray-bg: #f4f6f9; --gray-bd: #dde2ea; --text: #1a1a2e;
      --muted: #6b7280; --white: #ffffff; --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gray-bg); color: var(--text);
      height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .chat-window {
      width: 100%; max-width: 720px; height: 100dvh; max-height: 720px;
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden;
    }
    .chat-header {
      background: var(--blue); color: var(--white);
      padding: 18px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0;
    }
    .chat-header .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .chat-header .info h1 { font-size: 16px; font-weight: 600; }
    .chat-header .info p  { font-size: 12px; opacity: .8; margin-top: 2px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 5px; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--gray-bd); border-radius: 3px; }
    .message { display: flex; gap: 10px; max-width: 88%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .bot  .msg-avatar { background: var(--blue-lt); color: var(--blue); }
    .user .msg-avatar { background: var(--blue); color: var(--white); }
    .msg-bubble {
      padding: 12px 16px; border-radius: 18px; font-size: 14px;
      line-height: 1.55; white-space: pre-wrap; word-break: break-word;
    }
    .bot  .msg-bubble { background: var(--blue-lt); color: var(--text); border-bottom-left-radius: 4px; }
    .user .msg-bubble { background: var(--blue); color: var(--white); border-bottom-right-radius: 4px; }
    .typing .msg-bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); animation: bounce .9s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    .welcome { text-align: center; padding: 32px 24px; color: var(--muted); }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .welcome p  { font-size: 13px; line-height: 1.6; }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .quick-btn {
      background: var(--blue-lt); color: var(--blue);
      border: 1px solid var(--blue); border-radius: 20px;
      padding: 6px 14px; font-size: 12px; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .quick-btn:hover { background: var(--blue); color: var(--white); }
    .chat-input-wrap {
      border-top: 1px solid var(--gray-bd); padding: 16px 20px;
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--white); flex-shrink: 0;
    }
    .chat-input {
      flex: 1; resize: none; border: 1px solid var(--gray-bd); border-radius: 22px;
      padding: 10px 16px; font-size: 14px; font-family: inherit; line-height: 1.5;
      max-height: 120px; outline: none; transition: border-color .2s;
      background: var(--gray-bg); color: var(--text);
    }
    .chat-input:focus { border-color: var(--blue); background: var(--white); }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%; background: var(--blue);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s; flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: var(--blue-dk); transform: scale(1.05); }
    .send-btn:disabled { background: var(--gray-bd); cursor: not-allowed; }
    .send-btn svg { fill: white; width: 18px; height: 18px; }
    .error-bubble {
      background: #fee2e2; color: #991b1b; border-radius: 12px;
      padding: 10px 14px; font-size: 13px; align-self: center; max-width: 80%; text-align: center;
    }
    @media (max-width: 600px) {
      body { align-items: stretch; justify-content: stretch; }
      .chat-window { max-height: 100dvh; border-radius: 0; }
    }
  </style>
</head>
<body>
<div class="chat-window">
  <div class="chat-header">
    <div class="avatar">💻</div>
    <div class="info">
      <h1>PCe Solutions Assistant</h1>
      <p><span class="status-dot"></span>Online — here to help</p>
    </div>
  </div>
  <div class="chat-messages" id="messages">
    <div class="welcome">
      <div class="icon">👋</div>
      <h2>Welcome to PCe Solutions!</h2>
      <p>Tampa's trusted IT partner. Ask about our managed IT services, cybersecurity, cloud solutions, or contact information.</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="sendQuick('What services do you offer?')">Services</button>
        <button class="quick-btn" onclick="sendQuick('How can I contact PCe Solutions?')">Contact Info</button>
        <button class="quick-btn" onclick="sendQuick('What areas do you serve?')">Service Areas</button>
        <button class="quick-btn" onclick="sendQuick('What is your response time guarantee?')">Response Time</button>
        <button class="quick-btn" onclick="sendQuick('What industries do you specialize in?')">Industries</button>
      </div>
    </div>
  </div>
  <div class="chat-input-wrap">
    <textarea id="input" class="chat-input" placeholder="Ask about PCe Solutions..." rows="1" maxlength="1000"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("sendBtn");
  const history    = [];

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendQuick(text) { inputEl.value = text; sendMessage(); }
  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function addMessage(role, text) {
    const welcome = messagesEl.querySelector(".welcome");
    if (welcome) welcome.remove();
    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;
    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = role === "user" ? "You" : "🤖";
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function addTypingIndicator() {
    const welcome = messagesEl.querySelector(".welcome");
    if (welcome) welcome.remove();
    const wrap = document.createElement("div");
    wrap.className = "message bot typing";
    wrap.id = "typing";
    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = "🤖";
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function addError(msg) {
    const el = document.createElement("div");
    el.className = "error-bubble";
    el.textContent = msg;
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    addMessage("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    history.push({ role: "user", content: text });
    addTypingIndicator();
    try {
      const resp = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      if (!resp.ok) throw new Error(`Server error ${resp.status}`);
      removeTypingIndicator();
      const botBubble = addMessage("bot", "");
      let fullText = "";
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const payload = line.slice(6).trim();
          if (!payload) continue;
          try {
            const data = JSON.parse(payload);
            if (data.error) { addError(data.error); return; }
            if (data.text) { fullText += data.text; botBubble.textContent = fullText; scrollToBottom(); }
            if (data.done) { history.push({ role: "assistant", content: fullText }); }
          } catch (_) {}
        }
      }
    } catch (err) {
      removeTypingIndicator();
      addError("Connection error. Please try again.");
      history.pop();
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
